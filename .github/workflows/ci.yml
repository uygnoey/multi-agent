name: ci

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -U pip
      - run: pip install -e .
      # tomli only on Python <3.11 (3.11+ has stdlib tomllib): lets the pyproject-validation
      # tests run on the 3.10 matrix job instead of skipping (#19).
      - run: pip install ruff pytest 'tomli; python_version < "3.11"'
      - run: ruff check .
      - run: ruff format --check .
      # Use `python -m pytest` (not bare `pytest`) so the repo root is on sys.path and the
      # `orchestrator` package imports correctly even without an install on PATH (#134 / #42).
      - run: python -m pytest -q
